<div class="login-wrapper">

  <!-- Left brand panel -->
  <div class="brand-panel">
    <div class="brand-content">
      <div class="brand-logo">
        <mat-icon>event_available</mat-icon>
      </div>
      <h1>Belco Leave Portal</h1>
      <p>Manage your team's leave requests efficiently and transparently.</p>

      <div class="demo-section">
        <p class="demo-label">Quick login for demo</p>
        <div class="demo-buttons">
          <button class="demo-btn admin" (click)="quickLogin('admin')">
            <mat-icon>admin_panel_settings</mat-icon>
            <span>
              <strong>Admin</strong>
              <small>Full system access</small>
            </span>
          </button>
          <button class="demo-btn manager" (click)="quickLogin('manager')">
            <mat-icon>manage_accounts</mat-icon>
            <span>
              <strong>Manager</strong>
              <small>Approve team requests</small>
            </span>
          </button>
          <button class="demo-btn employee" (click)="quickLogin('employee')">
            <mat-icon>person</mat-icon>
            <span>
              <strong>Employee</strong>
              <small>Apply for leave</small>
            </span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Right form panel -->
  <div class="form-panel">
    <div class="form-card">
      <h2>Welcome back</h2>
      <p class="form-sub">Sign in to your account</p>

      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email address</mat-label>
          <mat-icon matPrefix>mail_outline</mat-icon>
          <input matInput type="email" formControlName="email" autocomplete="email" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <mat-icon matPrefix>lock_outline</mat-icon>
          <input matInput [type]="showPass ? 'text' : 'password'" formControlName="password" autocomplete="current-password" />
          <button mat-icon-button matSuffix type="button" (click)="showPass = !showPass">
            <mat-icon>{{ showPass ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        @if (error) {
          <div class="error-box">
            <mat-icon>error_outline</mat-icon> {{ error }}
          </div>
        }

        <button mat-flat-button class="sign-in-btn" type="submit" [disabled]="form.invalid || loading">
          @if (loading) {
            <mat-spinner diameter="20" />
          } @else {
            Sign In
          }
        </button>
      </form>
    </div>
  </div>

</div>
