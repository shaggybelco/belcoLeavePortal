<div class="page-header">
  <div>
    <h2>My Leave Requests</h2>
    <p>Track the status of your submitted leave requests</p>
  </div>
</div>

<mat-card>
  <table mat-table [dataSource]="requests" style="width:100%">
    <ng-container matColumnDef="leaveType">
      <th mat-header-cell *matHeaderCellDef>Type</th>
      <td mat-cell *matCellDef="let r">{{ r.leaveTypeName }}</td>
    </ng-container>
    <ng-container matColumnDef="dates">
      <th mat-header-cell *matHeaderCellDef>Dates</th>
      <td mat-cell *matCellDef="let r">{{ r.startDate }} → {{ r.endDate }}</td>
    </ng-container>
    <ng-container matColumnDef="days">
      <th mat-header-cell *matHeaderCellDef>Days</th>
      <td mat-cell *matCellDef="let r">{{ r.totalDays }}</td>
    </ng-container>
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let r"><app-status-badge [status]="r.status" /></td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let r" class="actions-cell">
        @if (r.status === 'Pending') {
          <button mat-icon-button title="Cancel Request" class="cancel-icon" (click)="cancel(r)">
            <mat-icon>event_busy</mat-icon>
          </button>
        }
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns;"></tr>
  </table>
</mat-card>

<style>
  .page-header {
    margin-bottom: 24px;
    h2 { margin: 0; font-size: 1.5rem; font-weight: 700; }
    p  { margin: 4px 0 0; color: #64748b; font-size: .875rem; }
  }
  .actions-cell { text-align: right; }
  .cancel-icon  { color: #ef4444 !important; }
</style>
