<div class="page-header">
  <div>
    <h2>Employees</h2>
    <p>Manage your organisation's user accounts</p>
  </div>
  <button mat-flat-button class="add-btn" (click)="openAdd()">
    <mat-icon>person_add</mat-icon>
    Add Employee
  </button>
</div>

<mat-card>
  <table mat-table [dataSource]="users" style="width:100%">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let u">
        <div class="user-cell">
          <div class="user-avatar">{{ u.firstName[0] }}{{ u.lastName[0] }}</div>
          <span>{{ u.firstName }} {{ u.lastName }}</span>
        </div>
      </td>
    </ng-container>
    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let u">{{ u.email }}</td>
    </ng-container>
    <ng-container matColumnDef="role">
      <th mat-header-cell *matHeaderCellDef>Role</th>
      <td mat-cell *matCellDef="let u">
        <span class="role-badge role-{{ u.role.toLowerCase() }}">{{ u.role }}</span>
      </td>
    </ng-container>
    <ng-container matColumnDef="department">
      <th mat-header-cell *matHeaderCellDef>Department</th>
      <td mat-cell *matCellDef="let u">{{ u.department ?? '—' }}</td>
    </ng-container>
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let u">
        <span class="status-pill" [class.active]="u.isActive" [class.inactive]="!u.isActive">
          {{ u.isActive ? 'Active' : 'Inactive' }}
        </span>
      </td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let u" class="actions-cell">
        <button mat-icon-button title="Edit" (click)="openEdit(u)"><mat-icon>edit</mat-icon></button>
        <button mat-icon-button title="Reset Password" class="reset-icon" (click)="openResetPassword(u)"><mat-icon>lock_reset</mat-icon></button>
        @if (u.isActive) {
          <button mat-icon-button title="Deactivate" class="warn-icon" (click)="deactivate(u)"><mat-icon>person_off</mat-icon></button>
        }
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns;"></tr>
  </table>
</mat-card>

<style>
  .page-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
    h2 { margin: 0; font-size: 1.5rem; font-weight: 700; }
    p  { margin: 4px 0 0; color: #64748b; font-size: .875rem; }
  }
  .add-btn {
    background: #6366f1 !important; color: white !important;
    border-radius: 10px !important; font-weight: 600;
    display: flex; align-items: center; gap: 6px;
  }
  .user-cell { display: flex; align-items: center; gap: 10px; }
  .user-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white; font-size: .75rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .role-badge { padding: 3px 10px; border-radius: 20px; font-size: .75rem; font-weight: 600; }
  .role-admin    { background: #ede9fe; color: #6366f1; }
  .role-manager  { background: #dbeafe; color: #3b82f6; }
  .role-employee { background: #f0fdf4; color: #22c55e; }
  .status-pill {
    padding: 3px 10px; border-radius: 20px; font-size: .75rem; font-weight: 600;
    &.active   { background: #f0fdf4; color: #22c55e; }
    &.inactive { background: #fef2f2; color: #ef4444; }
  }
  .actions-cell { white-space: nowrap; }
  .warn-icon  { color: #ef4444 !important; }
  .reset-icon { color: #f59e0b !important; }
</style>
