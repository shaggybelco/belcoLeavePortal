<h2>Departments</h2>
<mat-card style="max-width:420px; margin-bottom:16px">
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="save()" style="display:flex; gap:8px; align-items:flex-start; padding-top:8px">
      <mat-form-field appearance="outline" style="flex:1">
        <mat-label>Department Name</mat-label>
        <input matInput formControlName="name" />
      </mat-form-field>
      <button mat-raised-button color="primary" type="submit" style="margin-top:4px">
        {{ editingId ? 'Update' : 'Add' }}
      </button>
    </form>
  </mat-card-content>
</mat-card>

<mat-card>
  @if (loading) {
    <app-loading message="Loading departments..." />
  } @else {
    <table mat-table [dataSource]="departments" style="width:100%">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let d">{{ d.name }}</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let d">
          <button mat-button (click)="edit(d)">Edit</button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns;"></tr>
    </table>
  }
</mat-card>
