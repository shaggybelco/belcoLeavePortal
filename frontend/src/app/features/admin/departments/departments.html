<div class="page-header">
  <div>
    <h2>Departments</h2>
    <p>Manage your organisation's departments</p>
  </div>
  <button mat-flat-button class="add-btn" (click)="openAdd()">
    <mat-icon>domain_add</mat-icon>
    Add Department
  </button>
</div>

<mat-card>
  <table mat-table [dataSource]="departments" style="width:100%">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Department Name</th>
      <td mat-cell *matCellDef="let d">
        <div class="dept-cell">
          <div class="dept-icon"><mat-icon>domain</mat-icon></div>
          {{ d.name }}
        </div>
      </td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let d" class="actions-cell">
        <button mat-icon-button title="Edit" (click)="openEdit(d)"><mat-icon>edit</mat-icon></button>
        <button mat-icon-button title="Delete" class="warn-icon" (click)="confirmDelete(d)"><mat-icon>delete_outline</mat-icon></button>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns;"></tr>
  </table>
</mat-card>

<style>
  .page-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
    h2 { margin: 0; font-size: 1.5rem; font-weight: 700; }
    p  { margin: 4px 0 0; color: #64748b; font-size: .875rem; }
  }
  .add-btn {
    background: #6366f1 !important; color: white !important;
    border-radius: 10px !important; font-weight: 600;
    display: flex; align-items: center; gap: 6px;
  }
  .dept-cell { display: flex; align-items: center; gap: 10px; }
  .dept-icon {
    width: 34px; height: 34px; border-radius: 8px; background: #ede9fe;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    mat-icon { color: #6366f1; font-size: 18px; width: 18px; height: 18px; }
  }
  .actions-cell { white-space: nowrap; text-align: right; }
  .warn-icon { color: #ef4444 !important; }
</style>
